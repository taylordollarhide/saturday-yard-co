<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Leads — Saturday Yard Co.</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="app-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <style>
    :root {
      --cream: #f6f1e7;
      --paper: #fffaf0;
      --black: #151613;
      --green: #243c2a;
      --gold: #b9862f;
      --muted: #706b5e;
      --line: rgba(21,22,19,.14);
      --red: #c0392b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: var(--cream);
      color: var(--black);
      min-height: 100vh;
    }

    .topbar {
      background: var(--green);
      padding: env(safe-area-inset-top, 0) 0 0;
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      gap: 12px;
    }

    .topbar-title { color: var(--paper); font-size: 17px; font-weight: 900; }
    .topbar-sub { color: rgba(255,250,240,.6); font-size: 12px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }

    .topbar-actions { display: flex; gap: 8px; }

    .icon-btn {
      background: rgba(255,250,240,.12);
      border: none;
      color: var(--paper);
      border-radius: 10px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 17px;
    }

    .tab-bar {
      background: var(--green);
      display: flex;
      border-top: 1px solid rgba(255,250,240,.1);
    }

    .tab {
      flex: 1;
      padding: 10px 8px;
      text-align: center;
      color: rgba(255,250,240,.55);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .06em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      background: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .tab.active { color: var(--paper); }
    .tab .tab-icon { font-size: 18px; }

    .content { max-width: 600px; margin: 0 auto; padding: 16px 12px 100px; }

    .summary-strip { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }

    .stat-pill {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 800;
    }

    .stat-pill span { color: var(--muted); font-weight: 700; }

    /* Setup screen */
    .setup-screen {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 28px;
      margin-top: 8px;
    }

    .setup-screen h2 {
      font-family: Georgia, serif;
      font-size: 24px;
      letter-spacing: -.03em;
      margin-bottom: 8px;
    }

    .setup-screen p { color: var(--muted); font-size: 15px; margin-bottom: 20px; line-height: 1.5; }

    .setup-step {
      background: var(--cream);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
      font-size: 14px;
      line-height: 1.5;
    }

    .setup-step strong { display: block; font-size: 12px; font-weight: 900; letter-spacing: .08em; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }

    .setup-screen .field-group { margin-bottom: 12px; }

    .field-group { display: flex; flex-direction: column; gap: 5px; }

    .field-group label {
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .field-group input, .field-group select {
      border: 1.5px solid var(--line);
      background: #fffdf7;
      border-radius: 12px;
      padding: 12px 14px;
      font: inherit;
      font-size: 15px;
      color: var(--black);
      width: 100%;
    }

    .field-group input:focus, .field-group select:focus { outline: none; border-color: var(--green); }

    .btn-primary {
      display: block;
      width: 100%;
      padding: 15px;
      background: var(--black);
      color: var(--paper);
      border: none;
      border-radius: 999px;
      font: inherit;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      margin-top: 4px;
    }

    /* Lead cards */
    .lead-card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 20px;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .lead-card.confirmed { border-color: var(--green); opacity: .72; }

    .lead-card-body { padding: 16px; }

    .lead-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .lead-name { font-size: 19px; font-weight: 900; letter-spacing: -.02em; line-height: 1.1; }

    .lead-badge {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 999px;
    }

    .lead-badge.pending { background: rgba(185,134,47,.15); color: var(--gold); }
    .lead-badge.confirmed { background: rgba(36,60,42,.12); color: var(--green); }

    .lead-address {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 10px;
    }

    .lead-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 14px;
      margin-bottom: 10px;
    }

    .lead-meta-item { display: flex; flex-direction: column; gap: 1px; }
    .lead-meta-item strong { font-size: 11px; font-weight: 900; letter-spacing: .08em; text-transform: uppercase; color: rgba(21,22,19,.4); }
    .lead-meta-item span { font-weight: 600; color: var(--black); font-size: 14px; }

    .lead-notes {
      font-size: 13px;
      color: var(--muted);
      background: var(--cream);
      border-radius: 10px;
      padding: 8px 12px;
      margin-bottom: 10px;
      font-style: italic;
    }

    .lead-submitted { font-size: 12px; color: rgba(21,22,19,.35); font-weight: 700; margin-bottom: 12px; }

    .card-actions {
      display: flex;
      gap: 8px;
      border-top: 1px solid var(--line);
      padding: 10px 16px;
      background: rgba(246,241,231,.5);
    }

    .action-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      border: 1px solid var(--line);
      background: var(--paper);
      border-radius: 12px;
      padding: 9px 6px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .04em;
      color: var(--black);
      cursor: pointer;
      text-align: center;
    }

    .action-btn .btn-icon { font-size: 18px; }
    .action-btn.primary { background: var(--green); color: var(--paper); border-color: var(--green); }
    .action-btn.danger { color: var(--red); border-color: rgba(192,57,43,.2); }

    /* Loading / error */
    .status-msg {
      text-align: center;
      padding: 50px 24px;
      color: var(--muted);
      font-size: 15px;
    }

    .status-msg h3 { font-family: Georgia, serif; font-size: 22px; color: var(--black); margin-bottom: 8px; }

    /* Confirm sheet */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(21,22,19,.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--paper);
      border-radius: 28px 28px 0 0;
      width: 100%;
      max-width: 560px;
      padding-bottom: env(safe-area-inset-bottom, 20px);
      box-shadow: 0 -20px 60px rgba(21,22,19,.2);
    }

    .modal-handle { width: 36px; height: 4px; background: var(--line); border-radius: 2px; margin: 12px auto 0; }

    .modal-head { padding: 16px 20px 12px; border-bottom: 1px solid var(--line); }
    .modal-head h3 { font-size: 18px; font-weight: 900; letter-spacing: -.02em; }
    .modal-head p { font-size: 14px; color: var(--muted); margin-top: 2px; }

    .modal-body { padding: 16px 20px 20px; display: grid; gap: 14px; }

    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .modal-actions { display: flex; gap: 10px; padding: 0 20px 4px; }

    .modal-btn {
      flex: 1;
      padding: 15px;
      border-radius: 999px;
      font: inherit;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      border: 2px solid var(--black);
    }

    .modal-btn.primary { background: var(--black); color: var(--paper); }
    .modal-btn.ghost { background: transparent; color: var(--black); }

    .sms-preview {
      font-size: 13px;
      color: var(--muted);
      background: var(--cream);
      border-radius: 10px;
      padding: 10px 12px;
      line-height: 1.5;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div>
      <div class="topbar-title">Leads</div>
      <div class="topbar-sub">Saturday Yard Co.</div>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" id="refreshBtn" onclick="fetchLeads()" title="Refresh">↻</button>
      <button class="icon-btn" onclick="window.location.href='schedule.html'" title="Route Manager">🗺</button>
      <button class="icon-btn" onclick="showSettings()" title="Settings">⚙</button>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab active" id="tabPending" onclick="setTab('pending')">
      <span class="tab-icon">⏳</span>Pending
    </button>
    <button class="tab" id="tabConfirmed" onclick="setTab('confirmed')">
      <span class="tab-icon">✅</span>Confirmed
    </button>
  </div>
</div>

<div class="content" id="mainContent">
  <div id="summaryStrip" class="summary-strip"></div>
  <div id="leadsContainer"></div>
</div>

<!-- Confirm sheet -->
<div class="modal-backdrop" id="confirmBackdrop">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <h3 id="confirmName">Confirm client</h3>
      <p>Set route details — they'll be added to the schedule.</p>
    </div>
    <div class="modal-body">
      <div class="modal-grid">
        <div class="field-group">
          <label>Route Day</label>
          <select id="confirmDay">
            <option value="Sunday">Sunday</option>
            <option value="Monday">Monday</option>
            <option value="Tuesday">Tuesday</option>
            <option value="Wednesday">Wednesday</option>
            <option value="Thursday">Thursday</option>
            <option value="Friday">Friday</option>
            <option value="Saturday" selected>Saturday</option>
          </select>
        </div>
        <div class="field-group">
          <label>Stop #</label>
          <input type="number" id="confirmStop" min="1" max="99" placeholder="1">
        </div>
      </div>
      <div class="modal-grid">
        <div class="field-group">
          <label>Price / mow ($)</label>
          <input type="number" id="confirmPrice" min="1" placeholder="45">
        </div>
        <div class="field-group">
          <label>Start Date</label>
          <input type="date" id="confirmStartDate">
        </div>
      </div>
      <div class="field-group">
        <label>Confirmation text preview</label>
        <div class="sms-preview" id="smsPreview"></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn ghost" onclick="closeConfirm()">Cancel</button>
      <button class="modal-btn primary" onclick="confirmLead()">Add to Route & Text</button>
    </div>
  </div>
</div>

<script>
  const PRICE_MAP = { Small: 45, Standard: 55, Large: 65 };
  let currentTab = 'pending';
  let allLeads = [];
  let confirmingLead = null;

  // ── Netlify credentials ──
  function getCreds() {
    return {
      token:  localStorage.getItem('syc_nl_token') || '',
      siteId: localStorage.getItem('syc_nl_site') || ''
    };
  }

  function saveCreds(token, siteId) {
    localStorage.setItem('syc_nl_token', token.trim());
    localStorage.setItem('syc_nl_site', siteId.trim());
  }

  // ── Confirmed state (stored locally, keyed by Netlify submission ID) ──
  function getConfirmed() {
    return JSON.parse(localStorage.getItem('syc_confirmed') || '{}');
  }

  function saveConfirmed(obj) {
    localStorage.setItem('syc_confirmed', JSON.stringify(obj));
  }

  // ── Fetch from Netlify ──
  async function fetchLeads() {
    const { token, siteId } = getCreds();
    if (!token || !siteId) { showSetup(); return; }

    const container = document.getElementById('leadsContainer');
    container.innerHTML = '<div class="status-msg"><p>Loading submissions…</p></div>';

    try {
      // Get all forms for the site to find the client-intake form ID
      const formsRes = await fetch(
        `https://api.netlify.com/api/v1/forms?site_id=${encodeURIComponent(siteId)}`,
        { headers: { Authorization: `Bearer ${token}` } }
      );
      if (!formsRes.ok) throw new Error(`Auth failed (${formsRes.status}). Check your token and Site ID.`);

      const forms = await formsRes.json();
      const intakeForm = forms.find(f => f.name === 'client-intake');
      if (!intakeForm) {
        container.innerHTML = `<div class="status-msg"><h3>No submissions yet.</h3><p>The intake form hasn't received any responses. Share <strong>getsaturdayyard.com</strong> to start collecting leads.</p></div>`;
        return;
      }

      // Fetch all submissions (max 100; add pagination later if needed)
      const subRes = await fetch(
        `https://api.netlify.com/api/v1/forms/${intakeForm.id}/submissions?per_page=100`,
        { headers: { Authorization: `Bearer ${token}` } }
      );
      const submissions = await subRes.json();

      const confirmed = getConfirmed();

      allLeads = submissions.map(s => ({
        id:          s.id,
        first:       s.data.first || '',
        last:        s.data.last || '',
        address:     s.data.address || '',
        phone:       s.data.phone || '',
        email:       s.data.email || '',
        service:     s.data.service || '',
        yardSize:    s.data.yardSize || '',
        price:       PRICE_MAP[s.data.yardSize] || 65,
        notes:       s.data.notes || '',
        submittedAt: s.created_at,
        // Pull confirmed metadata from localStorage
        status:            confirmed[s.id] ? 'confirmed' : 'pending',
        confirmedDay:      confirmed[s.id]?.day || '',
        confirmedStartDate:confirmed[s.id]?.startDate || '',
        confirmedPrice:    confirmed[s.id]?.price || PRICE_MAP[s.data.yardSize] || 65,
        confirmedStop:     confirmed[s.id]?.stop || 1,
      }));

      render();
    } catch (err) {
      container.innerHTML = `<div class="status-msg"><h3>Connection error</h3><p>${err.message}</p><button class="btn-primary" style="max-width:240px;margin:16px auto 0" onclick="showSettings()">Check settings</button></div>`;
    }
  }

  // ── Render ──
  function setTab(tab) {
    currentTab = tab;
    document.getElementById('tabPending').classList.toggle('active', tab === 'pending');
    document.getElementById('tabConfirmed').classList.toggle('active', tab === 'confirmed');
    render();
  }

  function render() {
    const pending   = allLeads.filter(l => l.status === 'pending');
    const confirmed = allLeads.filter(l => l.status === 'confirmed');
    const list      = currentTab === 'pending' ? pending : confirmed;

    document.getElementById('summaryStrip').innerHTML = `
      <div class="stat-pill">${pending.length} <span>Pending</span></div>
      <div class="stat-pill">${confirmed.length} <span>Confirmed</span></div>
    `;

    const container = document.getElementById('leadsContainer');

    if (!list.length) {
      const msg = currentTab === 'pending'
        ? 'No pending leads. New intake form submissions will show here automatically.'
        : 'No confirmed clients yet.';
      container.innerHTML = `<div class="status-msg"><h3>${currentTab === 'pending' ? 'All clear.' : 'Nothing yet.'}</h3><p>${msg}</p></div>`;
      return;
    }

    const sorted = [...list].sort((a, b) =>
      currentTab === 'pending'
        ? new Date(b.submittedAt) - new Date(a.submittedAt)
        : a.last.localeCompare(b.last)
    );

    container.innerHTML = sorted.map(renderCard).join('');
  }

  function renderCard(lead) {
    const isPending = lead.status === 'pending';
    const date = new Date(lead.submittedAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const startDate = lead.confirmedStartDate
      ? new Date(lead.confirmedStartDate + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
      : null;

    return `
      <div class="lead-card ${lead.status}">
        <div class="lead-card-body">
          <div class="lead-header">
            <div class="lead-name">${lead.first} ${lead.last}</div>
            <div class="lead-badge ${lead.status}">${isPending ? 'Pending' : 'Confirmed'}</div>
          </div>
          <div class="lead-address">📍 ${lead.address}</div>
          <div class="lead-meta">
            <div class="lead-meta-item"><strong>Service</strong><span>${lead.service || '—'}</span></div>
            <div class="lead-meta-item"><strong>Yard Size</strong><span>${lead.yardSize || '—'} · $${lead.price}</span></div>
            <div class="lead-meta-item"><strong>Phone</strong><span>${lead.phone || '—'}</span></div>
            <div class="lead-meta-item"><strong>Email</strong><span>${lead.email || '—'}</span></div>
            ${startDate ? `
            <div class="lead-meta-item"><strong>Route Day</strong><span>${lead.confirmedDay}</span></div>
            <div class="lead-meta-item"><strong>Start Date</strong><span>${startDate}</span></div>` : ''}
          </div>
          ${lead.notes ? `<div class="lead-notes">"${lead.notes}"</div>` : ''}
          <div class="lead-submitted">Submitted ${date}</div>
        </div>
        <div class="card-actions" onclick="event.stopPropagation()">
          ${isPending ? `
            <button class="action-btn" onclick="smsLead('${lead.id}','intro')">
              <span class="btn-icon">💬</span>Intro Text
            </button>
            <button class="action-btn primary" onclick="openConfirm('${lead.id}')">
              <span class="btn-icon">✅</span>Confirm
            </button>
          ` : `
            <button class="action-btn" onclick="smsLead('${lead.id}','confirm')">
              <span class="btn-icon">💬</span>Re-send Text
            </button>
            <button class="action-btn" onclick="window.location.href='schedule.html'">
              <span class="btn-icon">🗺</span>Open Route
            </button>
          `}
        </div>
      </div>
    `;
  }

  // ── SMS ──
  function smsLead(id, type) {
    const lead = allLeads.find(l => l.id === id);
    if (!lead) return;
    const phone = lead.phone.replace(/\D/g, '');
    if (!phone) { alert('No phone number on file.'); return; }

    let msg;
    if (type === 'intro') {
      msg = `Hi ${lead.first}, this is Taylor from Saturday Yard Co.! Got your info — I'm building out your route and will follow up shortly to confirm your start date. Any questions just reply here. 🌿`;
    } else {
      const dateStr = lead.confirmedStartDate
        ? new Date(lead.confirmedStartDate + 'T12:00:00').toLocaleDateString('en-US', { month: 'long', day: 'numeric' })
        : 'your first scheduled day';
      msg = `Hi ${lead.first}, you're on the Saturday Yard Co. route! First mow is ${dateStr} (${lead.confirmedDay}). Rate is $${lead.confirmedPrice}/mow. I'll text when I'm on my way. — Taylor 🌿`;
    }

    window.location.href = `sms:${phone}?body=${encodeURIComponent(msg)}`;
  }

  // ── Confirm sheet ──
  function openConfirm(id) {
    const lead = allLeads.find(l => l.id === id);
    if (!lead) return;
    confirmingLead = lead;

    document.getElementById('confirmName').textContent = `${lead.first} ${lead.last}`;
    document.getElementById('confirmPrice').value = lead.price || '';

    const today = new Date();
    const daysUntilSat = (6 - today.getDay() + 7) % 7 || 7;
    const nextSat = new Date(today);
    nextSat.setDate(today.getDate() + daysUntilSat);
    document.getElementById('confirmStartDate').value = nextSat.toISOString().slice(0, 10);
    document.getElementById('confirmStop').value = '';

    updatePreview();

    ['confirmDay','confirmPrice','confirmStartDate'].forEach(elId => {
      document.getElementById(elId).addEventListener('input', updatePreview);
    });

    document.getElementById('confirmBackdrop').classList.add('open');
  }

  function updatePreview() {
    if (!confirmingLead) return;
    const day   = document.getElementById('confirmDay').value;
    const price = document.getElementById('confirmPrice').value;
    const raw   = document.getElementById('confirmStartDate').value;
    const dateStr = raw
      ? new Date(raw + 'T12:00:00').toLocaleDateString('en-US', { month: 'long', day: 'numeric' })
      : 'your first scheduled day';
    document.getElementById('smsPreview').textContent =
      `Hi ${confirmingLead.first}, you're on the Saturday Yard Co. route! First mow is ${dateStr} (${day}). Rate is $${price || '??'}/mow. I'll text when I'm on my way. — Taylor 🌿`;
  }

  function closeConfirm() {
    document.getElementById('confirmBackdrop').classList.remove('open');
    confirmingLead = null;
  }

  function confirmLead() {
    if (!confirmingLead) return;
    const lead      = confirmingLead;
    const day       = document.getElementById('confirmDay').value;
    const price     = parseFloat(document.getElementById('confirmPrice').value) || lead.price;
    const startDate = document.getElementById('confirmStartDate').value;
    const stop      = parseInt(document.getElementById('confirmStop').value) || 1;

    // Persist confirmed state locally
    const confirmed = getConfirmed();
    confirmed[lead.id] = { day, startDate, price, stop };
    saveConfirmed(confirmed);

    // Push to route manager (syc_clients)
    const clients = JSON.parse(localStorage.getItem('syc_clients') || '[]');
    if (!clients.find(c => c.id === lead.id)) {
      clients.push({
        id: lead.id, first: lead.first, last: lead.last,
        address: lead.address, phone: lead.phone, email: lead.email,
        service: lead.service, price, day, stop, notes: lead.notes, log: []
      });
      localStorage.setItem('syc_clients', JSON.stringify(clients));
    }

    // Update in-memory record
    const idx = allLeads.findIndex(l => l.id === lead.id);
    if (idx !== -1) {
      allLeads[idx] = { ...lead, status: 'confirmed', confirmedDay: day, confirmedStartDate: startDate, confirmedPrice: price, confirmedStop: stop };
    }

    closeConfirm();
    render();

    // Fire confirmation SMS
    smsLead(lead.id, 'confirm');
  }

  // ── Settings ──
  function showSettings() {
    const { token, siteId } = getCreds();
    document.getElementById('mainContent').innerHTML = `
      <div class="setup-screen">
        <h2>Connect to Netlify</h2>
        <p>Your intake form submissions live in Netlify. Add your credentials once and leads will sync automatically every time you open this page.</p>

        <div class="setup-step">
          <strong>Step 1 — Personal Access Token</strong>
          netlify.com → avatar → User Settings → Applications → <em>New access token</em>
        </div>
        <div class="setup-step">
          <strong>Step 2 — Project ID</strong>
          Open the <em>saturday-yard-co</em> project → Site Configuration → General → Project ID
        </div>

        <div class="field-group" style="margin: 20px 0 12px">
          <label>Personal Access Token</label>
          <input type="password" id="setupToken" placeholder="Paste token here" value="${token}">
        </div>
        <div class="field-group" style="margin-bottom: 20px">
          <label>Project ID</label>
          <input type="text" id="setupSite" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" value="${siteId}">
        </div>
        <button class="btn-primary" onclick="saveSettings()">Save & Load Leads</button>
      </div>
    `;
  }

  function saveSettings() {
    const token  = document.getElementById('setupToken').value.trim();
    const siteId = document.getElementById('setupSite').value.trim();
    if (!token || !siteId) { alert('Both fields are required.'); return; }
    saveCreds(token, siteId);
    // Restore normal content structure
    document.getElementById('mainContent').innerHTML = `
      <div id="summaryStrip" class="summary-strip"></div>
      <div id="leadsContainer"></div>
    `;
    fetchLeads();
  }

  function showSetup() {
    showSettings();
  }

  // ── Init ──
  const { token, siteId } = getCreds();
  if (!token || !siteId) {
    showSetup();
  } else {
    fetchLeads();
  }
</script>
</body>
</html>
